autoInstallPeers: false
frozenLockfile: true
preferFrozenLockfile: true
saveExact: true
blockExoticSubdeps: true
minimumReleaseAge: 1440

packages:
  - apps/*
  - packages/*
  - examples/*
  - tests/fixtures/*
  - tests/fixtures/ecosystem/*
  - benchmarks/vinext

catalog:
  "@cloudflare/kumo": ^2.2.0
  "@cloudflare/vite-plugin": ^1.31.0
  "@cloudflare/workers-types": ^4.0.0
  "@heroicons/react": 2.2.0
  "@mdx-js/loader": 3.1.0
  "@mdx-js/react": ^3.1.1
  "@mdx-js/rollup": ^3.1.1
  "@phosphor-icons/react": ^2.1.10
  "@playwright/test": ^1.60.0
  "@radix-ui/react-dialog": ^1.1.14
  "@radix-ui/react-dropdown-menu": ^2.1.15
  "@radix-ui/react-slot": ^1.2.3
  "@tailwindcss/forms": 0.5.10
  "@tailwindcss/postcss": 4.1.4
  "@tailwindcss/typography": 0.5.16
  "@tailwindcss/vite": ^4.1.0
  "@takumi-rs/image-response": ^0.72.0
  "@types/mdx": 2.0.13
  "@types/ms": 2.1.0
  "@types/node": ^25.9.2
  "@types/react": ^19.2.16
  "@types/react-dom": ^19.2.3
  "@typescript/native-preview": ^7.0.0-dev.20260213.1
  "@unpic/react": ^1.0.2
  "@vercel/og": ^0.8.6
  "@vitejs/plugin-react": ^6.0.1
  "@next/mdx": 16.2.7
  recma-codehike: 0.0.1
  remark-codehike: 0.0.1
  "@vitejs/plugin-rsc": ^0.5.27
  "@vitest/coverage-istanbul": 4.1.6
  better-auth: ^1.5.6
  better-sqlite3: ^12.0.0
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  codehike: 1.0.7
  date-fns: 4.1.0
  drizzle-kit: ^0.31.10
  drizzle-orm: ^0.45.2
  sanitize-html: ^2.17.3
  fumadocs-core: 16.7.9
  fumadocs-mdx: 14.2.10
  fumadocs-ui: 16.7.9
  image-size: 2.0.2
  ipaddr.js: ^2.1.0
  lucide-react: ^0.577.0
  magic-string: ^0.30.21
  "@mswjs/interceptors": ^0.41.3
  msw: ^2.14.6
  ms: 3.0.0-canary.1
  next: 16.2.7
  next-intl: ^4.9.2
  next-themes: ^0.4.6
  next-view-transitions: ^0.3.5
  nitro: npm:nitro-nightly@latest
  nuqs: ^2.8.8
  playwright: ^1.60.0
  postcss: 8.5.10
  react: ^19.2.7
  react-dom: ^19.2.7
  react-server-dom-webpack: ^19.2.7
  sass: 1.100.0
  server-only: ^0.0.1
  swr: ^2.0.0
  tailwind-merge: ^3.3.0
  tailwindcss: 4.1.4
  typescript: ^5.7.0
  use-count-up: 3.0.1
  validator: ^13.15.26
  vite: npm:@voidzero-dev/vite-plus-core@0.1.24
  vite-plugin-commonjs: ^0.10.4
  vite-plus: 0.1.24
  vite-tsconfig-paths: ^6.1.1
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.24
  web-vitals: ^4.2.4
  wrangler: ^4.80.0
  zod: 3.24.3
  knip: ^6.16.0
overrides:
  vite: "catalog:"
  vitest: "catalog:"
  picomatch: ">=2.3.2"
  srvx: ">=0.11.13"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
  ignoreMissing:
    - next
    - webpack
    - rollup

packageExtensions:
  # codehike@1.0.7 lists zod only as a devDependency, so pnpm doesn't nest zod
  # next to it. TS then resolves `zod` from inside codehike's .d.ts files to
  # whichever zod happens to be hoisted (zod@4.3.6 in this monorepo, pulled in
  # by better-auth/fumadocs), which is incompatible with codehike's zod v3
  # types. Declare zod as a peerDependency on codehike so pnpm pulls the
  # correct version (zod@3.24.3 from the catalog) into codehike's scope.
  codehike@1.0.7:
    peerDependencies:
      zod: 3.24.3

allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true
  workerd: true
  "@parcel/watcher": true
  "@swc/core": true
  unrs-resolver: false
  # MSW's postinstall only copies a service worker into ./public for browser
  # mocking. We exclusively use msw/node, so the postinstall is unnecessary.
  msw: false
